<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather & Map App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- WEATHER CARD -->
  <div class="container">
    <h1>Weather & Location App</h1>

    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Enter city">
      <button onclick="getWeather()">Search</button>
    </div>

    <div id="weatherResult"></div>
  </div>

  <!-- MAP (NOW OUTSIDE) -->
  <div id="map"></div>

  <!-- JS FILE -->
  <script src="script.js"></script>

  <!-- GOOGLE MAPS API (FIXED) -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDC7jJfgpwDI4SU8CmxD3OUsgIJ_OXpnl8&callback=initMap">
  </script>

</body>
</html>
